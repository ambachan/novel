<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Windows 11 Web OS</title>

<link rel="stylesheet" href="style.css">
konek
<style>



    b

.taskbar-app{

    width:58px;
    height:58px;

    border-radius:18px;

    display:flex;

    align-items:center;
    justify-content:center;

    cursor:pointer;

    transition:0.22s;
}

.taskbar-app:hover{

    transform:
    translateY(-10px)
    scale(1.12);

    background:
    rgba(255,255,255,0.12);
}

.taskbar-app img{

    width:33px;
    height:33px;
}

.start-btn{

    width:58px;
    height:58px;

    border:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    font-size:28px;

    cursor:pointer;

    transition:0.22s;
}

.start-btn:hover{

    transform:
    translateY(-10px)
    scale(1.1);

    background:
    rgba(255,255,255,0.14);
}

</style>
</head>

<body>

<!-- Desktop -->

<div class="desktop">

    <!-- Explorer -->

    <div class="desktop-icon"
    onclick="openExplorer()">

        <img src="assets/icons/explorer.png">

        <div>Explorer</div>

    </div>

    <!-- Browser -->

    <div class="desktop-icon"
    onclick="openBrowser()">

        <img src="assets/icons/edge.png">

        <div>Browser</div>

    </div>

    <!-- Settings -->

<!-- Games -->

<div class="desktop-icon"
onclick="openGame()">

    <img src="assets/icons/game.png">

    <div>Games</div>

</div>

    <div class="desktop-icon"
    onclick="openSettings()">

        <img src="assets/icons/settings.png">

        <div>Settings</div>

    </div>

</div>

<!-- Explorer Window -->

<div class="window"
id="explorerWindow">

    <div class="window-header">

        <span>File Explorer</span>

        <button onclick="closeExplorer()">
            X
        </button>

    </div>

    <iframe
    src="apps/explorer.html">
    </iframe>

</div>

<!-- Browser Window -->

<div class="window"
id="browserWindow">

    <div class="window-header">

        <span>Browser</span>

        <button onclick="closeBrowser()">
            X
        </button>

    </div>

    <iframe
    src="apps/browser.html">
    </iframe>

</div>

<!-- Settings Window -->

<div class="window"
id="settingsWindow">

    <div class="window-header">

        <span>Settings</span>

        <button onclick="closeSettings()">
            X
        </button>

    </div>

    <iframe
    src="apps/settings.html">
    </iframe>

</div>

<!-- Game Window -->

<div class="window"
id="gameWindow">

    <div class="window-header">

        <span>Games</span>

        <button onclick="closeGame()">
            X
        </button>

    </div>

    <div class="window-content">

        <iframe
        src="https://hextris.github.io/hextris/"
        width="100%"
        height="100%"
        frameborder="0">
        </iframe>

    </div>

</div>

<!-- Start Menu -->

<div class="start-menu"
id="startMenu">

    <h2>Pinned</h2>

    <div class="app-grid">

<div class="app-item"
onclick="openGame()">

    <img src="assets/icons/game.png">

    <span>Games</span>

</div>

        

        <div class="app-item"
        onclick="openExplorer()">

            <img src="assets/icons/explorer.png">

            <span>Explorer</span>

        </div>

       

        <div class="app-item"
        onclick="openBrowser()">

            <img src="assets/icons/edge.png">

            <span>Browser</span>

        </div>

       

        <div class="app-item"
        onclick="openSettings()">

            <img src="assets/icons/settings.png">

            <span>Settings</span>

        </div>

    </div>

</div>

<!-- Taskbar -->

<div class="taskbar">

    <!-- Start -->

    <button class="start-btn"
    onclick="toggleStartMenu()">

        ⊞

    </button>

    <!-- Explorer -->

    <div class="taskbar-app"
    onclick="openExplorer()">

        <img src=
        "assets/icons/explorer.png">

    </div>

    <!-- Browser -->

    <div class="taskbar-app"
    onclick="openBrowser()">

        <img src=
        "assets/icons/edge.png">

    </div>

    <!-- Settings -->

    <div class="taskbar-app"
    onclick="openSettings()">

        <img src=
        "assets/icons/settings.png">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
